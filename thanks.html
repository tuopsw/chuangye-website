<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提交成功 | 创野风暴</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #000000;
            --text-primary: #ffffff;
            --text-secondary: rgba(255,255,255,0.55);
            --accent: #2997ff;
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(41,151,255,0.15), transparent 60%);
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #00D4FF 0%, #007AFF 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
            animation: scaleIn 0.5s ease;
        }
        .success-icon svg {
            width: 40px;
            height: 40px;
            stroke: white;
            stroke-width: 3;
            fill: none;
        }
        h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: -0.02em;
        }
        p {
            font-size: 20px;
            color: var(--text-secondary);
            margin-bottom: 40px;
            max-width: 500px;
            line-height: 1.6;
        }
        .back-btn {
            padding: 16px 32px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 980px;
            font-size: 17px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: #4dabff;
            transform: scale(1.02);
        }
        @keyframes scaleIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="success-icon">
        <svg viewBox="0 0 24 24">
            <polyline points="20 6 9 17 4 12"/>
        </svg>
    </div>
    <h1>提交成功</h1>
    <p>感谢您的咨询！我们已收到您的信息，会尽快与您联系。</p>
    <a href="index.html" class="back-btn">返回首页</a>
</body>
</html>
